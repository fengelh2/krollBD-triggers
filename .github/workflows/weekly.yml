name: Weekly SFC pull + enrichment + trigger publish

on:
  schedule:
    # Mondays 00:00 UTC = 08:00 Hong Kong time
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Skip SFC re-scrape (use existing snapshots)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: data-writes  # shared with ad-hoc.yml + log_outreach.yml — never race on data/
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # weekly batches can exceed 45min when many new firms need classification

    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
      HUNTER_EMAIL: ${{ secrets.HUNTER_EMAIL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so rebase before push works
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Pre-flight snapshot precondition (when skipping scrape)
        if: ${{ inputs.skip_scrape }}
        run: |
          if ! ls data/snapshots/sfc_t9_corps_latest.csv >/dev/null 2>&1; then
            echo "::error::skip_scrape=true but no prior snapshot exists at data/snapshots/sfc_t9_corps_latest.csv"
            exit 1
          fi

      - name: Scrape SFC register
        if: ${{ !inputs.skip_scrape }}
        run: python tools/scrape_sfc_register.py

      - name: Classify new/changed firms
        run: python tools/classify_strategy.py

      - name: Verify emails (drop wrong-firm captures)
        run: python tools/verify_emails_against_disambig.py

      - name: Derive website_accuracy column
        run: python tools/derive_website_accuracy.py

      - name: Publish triggers (writes meta files, no inline push)
        run: python tools/publish_triggers_to_github.py --no-push

      - name: Commit + push data updates
        run: |
          set -euo pipefail
          git config user.email "fengelh@gmail.com"
          git config user.name "krollBD-bot"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes this run."
            exit 0
          fi
          git commit -m "weekly: $(date -u +%Y-%m-%d) refresh"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 5
          done
