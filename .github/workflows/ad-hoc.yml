name: Ad-hoc backfill (deep-scrape / re-classify)

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Which tool to run'
        required: true
        type: choice
        options:
          - deep_scrape
          - reclassify
      scope:
        description: 'Scope for deep_scrape (ignored for reclassify)'
        required: false
        type: choice
        default: 'verified-bd'
        options:
          - verified
          - verified-high
          - verified-bd
          - probable
          - probable-high
          - probable-bd
          - unverified-bd
      cerefs:
        description: 'For reclassify: comma-separated CE refs (e.g. ASK527,BUY347)'
        required: false
        type: string
      force:
        description: 'For reclassify: ignore existing classification and re-run'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Just print what would happen, do not write'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: data-writes  # shared with weekly.yml + log_outreach.yml — never race on data/
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so rebase before push works
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Validate reclassify inputs
        if: inputs.task == 'reclassify'
        env:
          CEREFS: ${{ inputs.cerefs }}
        run: |
          if [ -z "$CEREFS" ]; then
            echo "::error::reclassify requires the 'cerefs' input"
            exit 1
          fi

      - name: Deep-scrape
        if: inputs.task == 'deep_scrape'
        env:
          SCOPE: ${{ inputs.scope }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS=(--scope "$SCOPE")
          [ "$DRY_RUN" = "true" ] && ARGS+=(--dry-run)
          python tools/deep_scrape_contact_pages.py "${ARGS[@]}"

      - name: Reclassify cerefs
        if: inputs.task == 'reclassify'
        env:
          CEREFS: ${{ inputs.cerefs }}
          FORCE: ${{ inputs.force }}
        run: |
          ARGS=(--cerefs "$CEREFS")
          [ "$FORCE" = "true" ] && ARGS+=(--force)
          python tools/classify_strategy.py "${ARGS[@]}"

      - name: Commit + push data updates
        if: ${{ !inputs.dry_run }}
        env:
          TASK: ${{ inputs.task }}
          SCOPE: ${{ inputs.scope }}
          CEREFS: ${{ inputs.cerefs }}
        run: |
          set -euo pipefail
          git config user.email "fengelh@gmail.com"
          git config user.name "krollBD-bot"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes this run."
            exit 0
          fi
          DATE_STR="$(date -u +%Y-%m-%d)"
          if [ "$TASK" = "deep_scrape" ]; then
            MSG="deep_scrape: $DATE_STR scope=$SCOPE"
          else
            MSG="reclassify: $DATE_STR cerefs=$CEREFS"
          fi
          git commit -m "$MSG"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 5
          done
